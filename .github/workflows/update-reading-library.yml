name: Update Reading Library

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-reading-library
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Collect recent healthtech articles
        run: node scripts/update-reading-library.mjs
      - name: Commit updated library
        run: |
          if git diff --quiet -- data/generated-articles.json; then
            echo "No reading library changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated-articles.json
          git commit -m "chore: update reading library"
          git push
